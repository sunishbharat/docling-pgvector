version: '3.8'

networks:
  devnet:
    name: devnet         

services:
  app:
    image: mcr.microsoft.com/devcontainers/python:3-3.13-trixie
    volumes:
      - ..:/workspace/docling-pgvector:cached
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/vectordb
    depends_on:
      - pgvector
    networks:
      - devnet

  pgvector:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectordb
    ports:
      - 5432:5432
    restart: unless-stopped
    networks:
      - devnet