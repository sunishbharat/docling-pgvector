

services:
  app:
    image: ghcr.io/sunishbharat/docling-pgvector:cpu-dev    
    volumes:
      - ..:/workspace/docling-pgvector:cached
    working_dir: /workspace/docling-pgvector
    command: sleep infinity
    environment:
      DATABASE_URL: postgresql://postgres:postgres@pgvector:5432/vectordb
      VIRTUAL_ENV: /opt/venv
      UV_PROJECT_ENVIRONMENT: /opt/venv
      SHELL: /bin/bash
    depends_on:
      pgvector:
        condition: service_healthy
    networks:
      - devnet

  pgvector:
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: vectordb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    networks:
      - devnet                   

networks:
  devnet:                         
    name: devnet

volumes:
  pgvector_data: