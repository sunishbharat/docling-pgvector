# This workflow will install pgvector docker image, Python dependencies, run tests

name: docling_pgvector_test 

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      pgvector:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vectordb
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Check images
        run: docker images

      - name: Volume check
        run: docker volume ls

      - name: Volume create
        run: docker volume create pgvector-data 

      - name: Wait for healthy state
        run: docker compose ps
      
      - name: run docker image
        run: docker run --name pgvector-container -e POSTGRES_PASSWORD=postgres -p 5432:5432 -v pgvector-data:/var/lib/postgresql/data -d pgvector/pgvector:pg17

      - name: check healthy state
        run: docker ps
        


      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7        # ← official uv action
        with:
          enable-cache: true               # ← caches deps between runs 🚀
          python-version: "3.12"

      - name: Install all dependencies
        run: uv sync                        # ← reads pyproject.toml + uv.lock

      - name: Run app
        run: uv run python ./src/pgvector_client.py
